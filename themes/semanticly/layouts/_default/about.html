{{ define "main" }}
<article class="page about-page">
  <header class="page-header">
    <div class="container">
      <h1>{{ .Title }}</h1>
      {{ with .Description }}<p class="page-description">{{ . }}</p>{{ end }}
    </div>
  </header>

  <div class="container">
    <div class="about-intro">
      <div class="about-photo-wrapper">
        <img src="{{ "images/nicolas-matentzoglu.jpg" | absURL }}" alt="Nicolas Matentzoglu" class="about-photo" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
        <div class="about-photo-placeholder" style="display:none;">
          {{/* Placeholder shown if no image */}}
          <svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="100" cy="100" r="98" fill="#E2E8F0" stroke="#CBD5E0" stroke-width="2"/>
            <circle cx="100" cy="80" r="35" fill="#A0AEC0"/>
            <path d="M35 175 C35 130 75 105 100 105 C125 105 165 130 165 175" fill="#A0AEC0"/>
          </svg>
        </div>
      </div>

      <div class="about-bio content">
        {{ .Content }}
      </div>
    </div>



  </div>
</article>
{{ end }}
